name: tgyunying

x-backend-env: &backend-env
  APP_ENV: ${APP_ENV:-production}
  TZ: ${TZ:-Asia/Shanghai}
  DATABASE_URL: ${DATABASE_URL:?DATABASE_URL is required}
  REDIS_URL: ${REDIS_URL:?REDIS_URL is required}
  QUEUE_BACKEND: ${QUEUE_BACKEND:-redis}
  SESSION_SECRET_KEY: ${SESSION_SECRET_KEY:?SESSION_SECRET_KEY is required}
  CORS_ORIGINS: ${CORS_ORIGINS:?CORS_ORIGINS is required}
  TG_GATEWAY_MODE: ${TG_GATEWAY_MODE:-telethon}
  TG_API_ID: ${TG_API_ID:-}
  TG_API_HASH: ${TG_API_HASH:-}
  ADMIN_BOOTSTRAP_USERNAME: ${ADMIN_BOOTSTRAP_USERNAME:-admin}
  ADMIN_BOOTSTRAP_PASSWORD: ${ADMIN_BOOTSTRAP_PASSWORD:?ADMIN_BOOTSTRAP_PASSWORD is required}
  ADMIN_BOOTSTRAP_EMAIL: ${ADMIN_BOOTSTRAP_EMAIL:-}
  PUBLIC_APP_BASE_URL: ${PUBLIC_APP_BASE_URL:?PUBLIC_APP_BASE_URL is required}
  AUTO_MIGRATE_ON_START: ${AUTO_MIGRATE_ON_START:-false}
  SEED_DEMO_DATA: ${SEED_DEMO_DATA:-false}
  SEED_TG_DEVELOPER_APP_FROM_ENV: ${SEED_TG_DEVELOPER_APP_FROM_ENV:-false}
  ENABLE_EMBEDDED_WORKER: ${ENABLE_EMBEDDED_WORKER:-false}
  ENABLE_LEGACY_CAMPAIGN_WORKER: ${ENABLE_LEGACY_CAMPAIGN_WORKER:-false}
  ENABLE_LEGACY_OPERATION_TASK_WORKER: ${ENABLE_LEGACY_OPERATION_TASK_WORKER:-false}
  ENABLE_LEGACY_CAMPAIGN_ROUTES: ${ENABLE_LEGACY_CAMPAIGN_ROUTES:-false}
  ENABLE_LEGACY_OPERATION_TASK_ROUTES: ${ENABLE_LEGACY_OPERATION_TASK_ROUTES:-false}
  ENABLE_LEGACY_REVIEW_ROUTES: ${ENABLE_LEGACY_REVIEW_ROUTES:-false}
  ENABLE_REDIS_TOKEN_BUCKET: ${ENABLE_REDIS_TOKEN_BUCKET:-true}
  ENABLE_REDIS_ACCOUNT_INFLIGHT: ${ENABLE_REDIS_ACCOUNT_INFLIGHT:-true}
  REDIS_ACCOUNT_INFLIGHT_SECONDS: ${REDIS_ACCOUNT_INFLIGHT_SECONDS:-1800}
  WORKER_ROLE: ${WORKER_ROLE:-all}
  WORKER_DRAIN_LIMIT: ${WORKER_DRAIN_LIMIT:-100}
  WORKER_INTERVAL_SECONDS: ${WORKER_INTERVAL_SECONDS:-2.0}
  DISPATCHER_CONCURRENCY: ${DISPATCHER_CONCURRENCY:-20}
  ACCOUNT_SHARD_TOTAL: ${ACCOUNT_SHARD_TOTAL:-1}
  ACCOUNT_SHARD_INDEX: ${ACCOUNT_SHARD_INDEX:-0}
  DB_POOL_SIZE: ${DB_POOL_SIZE:-5}
  DB_MAX_OVERFLOW: ${DB_MAX_OVERFLOW:-10}
  DB_POOL_TIMEOUT: ${DB_POOL_TIMEOUT:-30}
  DB_POOL_RECYCLE: ${DB_POOL_RECYCLE:-1800}
  RUNTIME_METRIC_RETENTION_DAYS: ${RUNTIME_METRIC_RETENTION_DAYS:-3}
  RUNTIME_METRIC_RETENTION_BATCH_SIZE: ${RUNTIME_METRIC_RETENTION_BATCH_SIZE:-20000}
  RUNTIME_METRIC_CLEANUP_INTERVAL_SECONDS: ${RUNTIME_METRIC_CLEANUP_INTERVAL_SECONDS:-60}
  REDIS_TOKEN_FAIL_CLOSED: ${REDIS_TOKEN_FAIL_CLOSED:-true}
  GLOBAL_TG_RATE_PER_SECOND: ${GLOBAL_TG_RATE_PER_SECOND:-30}
  TASK_RATE_PER_MINUTE: ${TASK_RATE_PER_MINUTE:-120}
  TASK_TYPE_RATE_PER_MINUTE: ${TASK_TYPE_RATE_PER_MINUTE:-300}
  ACCOUNT_RATE_PER_HOUR: ${ACCOUNT_RATE_PER_HOUR:-120}
  PROXY_RATE_PER_MINUTE: ${PROXY_RATE_PER_MINUTE:-300}
  TARGET_RATE_PER_MINUTE: ${TARGET_RATE_PER_MINUTE:-60}
  MEDIA_RATE_PER_MINUTE: ${MEDIA_RATE_PER_MINUTE:-30}
  MEDIA_ROOT: /app/media

x-worker-healthcheck: &worker-healthcheck
  test: ["CMD-SHELL", "python -m app.worker_health --role \"$${WORKER_ROLE:-all}\""]
  interval: 20s
  timeout: 10s
  start_period: 45s
  retries: 6

services:
  backend:
    image: ${TGYUNYING_BACKEND_IMAGE:?TGYUNYING_BACKEND_IMAGE is required}
    container_name: tgyunying-backend
    restart: unless-stopped
    environment:
      <<: *backend-env
    ports:
      - "${TGYUNYING_BACKEND_BIND_HOST:-127.0.0.1}:${TGYUNYING_BACKEND_HOST_PORT:-18090}:8000"
    volumes:
      - "${TGYUNYING_MEDIA_DIR:-/data/tgyunying/shared/media}:/app/media"
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8000/api/health"]
      interval: 15s
      timeout: 5s
      start_period: 30s
      retries: 8
    networks:
      - infra_default

  worker-planner:
    image: ${TGYUNYING_BACKEND_IMAGE:?TGYUNYING_BACKEND_IMAGE is required}
    container_name: tgyunying-worker-planner
    restart: unless-stopped
    command: ["python", "-m", "app.worker", "--role", "planner", "--limit", "${WORKER_DRAIN_LIMIT:-100}", "--interval", "${WORKER_INTERVAL_SECONDS:-2.0}"]
    environment:
      <<: *backend-env
      WORKER_ROLE: planner
    volumes:
      - "${TGYUNYING_MEDIA_DIR:-/data/tgyunying/shared/media}:/app/media"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck: *worker-healthcheck
    networks:
      - infra_default

  worker-dispatcher-1:
    image: ${TGYUNYING_BACKEND_IMAGE:?TGYUNYING_BACKEND_IMAGE is required}
    container_name: tgyunying-worker-dispatcher-1
    restart: unless-stopped
    command: ["python", "-m", "app.worker", "--role", "dispatcher", "--limit", "${WORKER_DRAIN_LIMIT:-100}", "--interval", "${WORKER_INTERVAL_SECONDS:-2.0}"]
    environment:
      <<: *backend-env
      WORKER_ROLE: dispatcher
      ACCOUNT_SHARD_TOTAL: "4"
      ACCOUNT_SHARD_INDEX: "0"
    volumes:
      - "${TGYUNYING_MEDIA_DIR:-/data/tgyunying/shared/media}:/app/media"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck: *worker-healthcheck
    networks:
      - infra_default

  worker-dispatcher-2:
    image: ${TGYUNYING_BACKEND_IMAGE:?TGYUNYING_BACKEND_IMAGE is required}
    container_name: tgyunying-worker-dispatcher-2
    restart: unless-stopped
    command: ["python", "-m", "app.worker", "--role", "dispatcher", "--limit", "${WORKER_DRAIN_LIMIT:-100}", "--interval", "${WORKER_INTERVAL_SECONDS:-2.0}"]
    environment:
      <<: *backend-env
      WORKER_ROLE: dispatcher
      ACCOUNT_SHARD_TOTAL: "4"
      ACCOUNT_SHARD_INDEX: "1"
    volumes:
      - "${TGYUNYING_MEDIA_DIR:-/data/tgyunying/shared/media}:/app/media"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck: *worker-healthcheck
    networks:
      - infra_default

  worker-dispatcher-3:
    image: ${TGYUNYING_BACKEND_IMAGE:?TGYUNYING_BACKEND_IMAGE is required}
    container_name: tgyunying-worker-dispatcher-3
    restart: unless-stopped
    command: ["python", "-m", "app.worker", "--role", "dispatcher", "--limit", "${WORKER_DRAIN_LIMIT:-100}", "--interval", "${WORKER_INTERVAL_SECONDS:-2.0}"]
    environment:
      <<: *backend-env
      WORKER_ROLE: dispatcher
      ACCOUNT_SHARD_TOTAL: "4"
      ACCOUNT_SHARD_INDEX: "2"
    volumes:
      - "${TGYUNYING_MEDIA_DIR:-/data/tgyunying/shared/media}:/app/media"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck: *worker-healthcheck
    networks:
      - infra_default

  worker-dispatcher-4:
    image: ${TGYUNYING_BACKEND_IMAGE:?TGYUNYING_BACKEND_IMAGE is required}
    container_name: tgyunying-worker-dispatcher-4
    restart: unless-stopped
    command: ["python", "-m", "app.worker", "--role", "dispatcher", "--limit", "${WORKER_DRAIN_LIMIT:-100}", "--interval", "${WORKER_INTERVAL_SECONDS:-2.0}"]
    environment:
      <<: *backend-env
      WORKER_ROLE: dispatcher
      ACCOUNT_SHARD_TOTAL: "4"
      ACCOUNT_SHARD_INDEX: "3"
    volumes:
      - "${TGYUNYING_MEDIA_DIR:-/data/tgyunying/shared/media}:/app/media"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck: *worker-healthcheck
    networks:
      - infra_default

  worker-listener:
    image: ${TGYUNYING_BACKEND_IMAGE:?TGYUNYING_BACKEND_IMAGE is required}
    container_name: tgyunying-worker-listener
    restart: unless-stopped
    command: ["python", "-m", "app.worker", "--role", "listener", "--limit", "${WORKER_DRAIN_LIMIT:-100}", "--interval", "${WORKER_INTERVAL_SECONDS:-2.0}"]
    environment:
      <<: *backend-env
      WORKER_ROLE: listener
    volumes:
      - "${TGYUNYING_MEDIA_DIR:-/data/tgyunying/shared/media}:/app/media"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck: *worker-healthcheck
    networks:
      - infra_default

  worker-recovery:
    image: ${TGYUNYING_BACKEND_IMAGE:?TGYUNYING_BACKEND_IMAGE is required}
    container_name: tgyunying-worker-recovery
    restart: unless-stopped
    command: ["python", "-m", "app.worker", "--role", "recovery", "--limit", "${WORKER_DRAIN_LIMIT:-100}", "--interval", "${WORKER_INTERVAL_SECONDS:-2.0}"]
    environment:
      <<: *backend-env
      WORKER_ROLE: recovery
    volumes:
      - "${TGYUNYING_MEDIA_DIR:-/data/tgyunying/shared/media}:/app/media"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck: *worker-healthcheck
    networks:
      - infra_default

  worker-account-security:
    image: ${TGYUNYING_BACKEND_IMAGE:?TGYUNYING_BACKEND_IMAGE is required}
    container_name: tgyunying-worker-account-security
    restart: unless-stopped
    command: ["python", "-m", "app.worker", "--role", "account-security", "--limit", "${ACCOUNT_SECURITY_WORKER_DRAIN_LIMIT:-20}", "--interval", "${ACCOUNT_SECURITY_WORKER_INTERVAL_SECONDS:-2.0}"]
    environment:
      <<: *backend-env
      WORKER_ROLE: account-security
    volumes:
      - "${TGYUNYING_MEDIA_DIR:-/data/tgyunying/shared/media}:/app/media"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck: *worker-healthcheck
    networks:
      - infra_default

  worker-account-online:
    image: ${TGYUNYING_BACKEND_IMAGE:?TGYUNYING_BACKEND_IMAGE is required}
    container_name: tgyunying-worker-account-online
    restart: unless-stopped
    command: ["python", "-m", "app.worker", "--role", "account-online", "--limit", "${ACCOUNT_ONLINE_WORKER_DRAIN_LIMIT:-100}", "--interval", "${ACCOUNT_ONLINE_WORKER_INTERVAL_SECONDS:-5.0}"]
    environment:
      <<: *backend-env
      WORKER_ROLE: account-online
      ACCOUNT_ONLINE_WORKER_INTERVAL_SECONDS: ${ACCOUNT_ONLINE_WORKER_INTERVAL_SECONDS:-5.0}
      WORKER_INTERVAL_SECONDS: ${ACCOUNT_ONLINE_WORKER_INTERVAL_SECONDS:-5.0}
    volumes:
      - "${TGYUNYING_MEDIA_DIR:-/data/tgyunying/shared/media}:/app/media"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck: *worker-healthcheck
    networks:
      - infra_default

  worker-ai-memory:
    image: ${TGYUNYING_BACKEND_IMAGE:?TGYUNYING_BACKEND_IMAGE is required}
    container_name: tgyunying-worker-ai-memory
    restart: unless-stopped
    command: ["python", "-m", "app.worker", "--role", "ai-memory", "--limit", "${AI_MEMORY_WORKER_DRAIN_LIMIT:-100}", "--interval", "${AI_MEMORY_WORKER_INTERVAL_SECONDS:-60.0}"]
    environment:
      <<: *backend-env
      WORKER_ROLE: ai-memory
      AI_MEMORY_WORKER_INTERVAL_SECONDS: ${AI_MEMORY_WORKER_INTERVAL_SECONDS:-60.0}
      WORKER_INTERVAL_SECONDS: ${AI_MEMORY_WORKER_INTERVAL_SECONDS:-60.0}
    volumes:
      - "${TGYUNYING_MEDIA_DIR:-/data/tgyunying/shared/media}:/app/media"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck: *worker-healthcheck
    networks:
      - infra_default

  worker-metrics:
    image: ${TGYUNYING_BACKEND_IMAGE:?TGYUNYING_BACKEND_IMAGE is required}
    container_name: tgyunying-worker-metrics
    restart: unless-stopped
    command: ["python", "-m", "app.worker", "--role", "metrics", "--limit", "${WORKER_DRAIN_LIMIT:-100}", "--interval", "${METRICS_WORKER_INTERVAL_SECONDS:-10.0}"]
    environment:
      <<: *backend-env
      WORKER_ROLE: metrics
      METRICS_WORKER_INTERVAL_SECONDS: ${METRICS_WORKER_INTERVAL_SECONDS:-10.0}
      WORKER_INTERVAL_SECONDS: ${METRICS_WORKER_INTERVAL_SECONDS:-10.0}
    volumes:
      - "${TGYUNYING_MEDIA_DIR:-/data/tgyunying/shared/media}:/app/media"
    depends_on:
      backend:
        condition: service_healthy
    healthcheck: *worker-healthcheck
    networks:
      - infra_default

networks:
  infra_default:
    name: ${INFRA_NETWORK_NAME:-infra_default}
    external: true
