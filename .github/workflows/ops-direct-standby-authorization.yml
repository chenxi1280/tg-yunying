name: Ops Direct Standby Authorization

on:
  workflow_dispatch:
    inputs:
      mode:
        description: smoke handles one account; batch handles multiple gap accounts
        required: true
        default: smoke
        type: choice
        options:
          - smoke
          - batch
      limit:
        description: Max accounts to handle in batch mode; smoke ignores this and uses 1
        required: true
        default: "20"

permissions:
  contents: read

jobs:
  authorize:
    runs-on: ubuntu-latest
    environment: production-silicon-valley
    timeout-minutes: 60

    steps:
      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SILICON_VALLEY_PRODUCTION_SSH_PRIVATE_KEY }}
          DEPLOY_HOST: ${{ secrets.SILICON_VALLEY_PRODUCTION_HOST }}
          DEPLOY_USER: ${{ secrets.SILICON_VALLEY_PRODUCTION_USER }}
          DEPLOY_PORT: ${{ secrets.SILICON_VALLEY_PRODUCTION_PORT }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${SSH_PRIVATE_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          cat > ~/.ssh/config <<EOF
          Host silicon-valley-production-server
            HostName ${DEPLOY_HOST}
            User ${DEPLOY_USER}
            Port ${DEPLOY_PORT:-22}
            IdentityFile ~/.ssh/id_ed25519
            IdentitiesOnly yes
            StrictHostKeyChecking accept-new
            ConnectTimeout 60
            ServerAliveInterval 15
            ServerAliveCountMax 8
          EOF
          chmod 600 ~/.ssh/config

      - name: Login standby authorizations directly
        env:
          OPS_MODE: ${{ inputs.mode }}
          OPS_LIMIT: ${{ inputs.limit }}
          STANDBY_2FA_PASSWORD: ${{ secrets.PROD_STANDBY_2FA_PASSWORD }}
        run: |
          set -euo pipefail
          test -n "${STANDBY_2FA_PASSWORD}"
          ssh silicon-valley-production-server \
            "docker exec -i -e OPS_MODE='${OPS_MODE}' -e OPS_LIMIT='${OPS_LIMIT}' -e STANDBY_2FA_PASSWORD='${STANDBY_2FA_PASSWORD}' tgyunying-worker-account-security python -" <<'PY'
          import json
          import os
          import time
          from datetime import timedelta

          from sqlalchemy import select

          from app.database import SessionLocal
          from app.models import (
              AccountStatus,
              TelegramDeveloperApp,
              TgAccount,
              TgAccountAuthorization,
              TgLoginFlow,
              TgVerificationCode,
          )
          from app.security import encrypt_session
          from app.services._common import _now, audit, gateway
          from app.services.account_authorization_constants import ACTIVE_STATUSES, NEEDS_REPAIR_STATUS
          from app.services.account_two_fa import record_managed_two_fa_password
          from app.services.accounts import get_account_phone
          from app.services.developer_apps import credentials_for_account, credentials_for_developer_app

          STANDBY_ROLES = ("standby_1", "standby_2")
          ACTOR = "ops-direct-standby-authorization"
          TWO_FA_PASSWORD = os.environ["STANDBY_2FA_PASSWORD"]
          MODE = os.environ.get("OPS_MODE", "smoke").strip().lower()
          LIMIT = 1 if MODE == "smoke" else max(1, int(os.environ.get("OPS_LIMIT", "20")))

          def account_roles(session, account_id):
              return set(
                  session.scalars(
                      select(TgAccountAuthorization.role).where(
                          TgAccountAuthorization.account_id == account_id,
                          TgAccountAuthorization.disabled_at.is_(None),
                          TgAccountAuthorization.role.in_(STANDBY_ROLES),
                          TgAccountAuthorization.status.in_(list(ACTIVE_STATUSES) + ["standby"]),
                          TgAccountAuthorization.session_ciphertext != "",
                      )
                  )
              )

          def gap_accounts(session):
              accounts = list(
                  session.scalars(
                      select(TgAccount).where(
                          TgAccount.deleted_at.is_(None),
                          TgAccount.status == AccountStatus.ACTIVE.value,
                          TgAccount.session_ciphertext != "",
                      ).order_by(TgAccount.id.asc())
                  )
              )
              return [account for account in accounts if len(account_roles(session, account.id)) < 2]

          def healthy_apps(session):
              apps = list(
                  session.scalars(
                      select(TelegramDeveloperApp)
                      .where(TelegramDeveloperApp.is_active.is_(True), TelegramDeveloperApp.health_status == "健康")
                      .order_by(TelegramDeveloperApp.id.asc())
                  )
              )
              if not apps:
                  raise RuntimeError("no healthy developer app")
              return apps

          def choose_app(apps, account, role):
              excluded = {account.developer_app_id}
              available = [app for app in apps if app.id not in excluded] or apps
              offset = 0 if role == "standby_1" else 1
              return available[offset % len(available)]

          def poll_login_code(session, account, flow):
              if flow.code_preview:
                  return flow.code_preview
              deadline = _now() + timedelta(seconds=70)
              while _now() <= deadline:
                  snapshots = gateway.poll_verification_codes(
                      account.id,
                      session_ciphertext=account.session_ciphertext,
                      credentials=credentials_for_account(session, account),
                  )
                  if snapshots:
                      snapshot = snapshots[0]
                      flow.code_preview = snapshot.code
                      flow.code_expires_at = snapshot.expires_at
                      session.add(
                          TgVerificationCode(
                              tenant_id=account.tenant_id,
                              account_id=account.id,
                              source="direct_standby_authorization_login",
                              code_preview=snapshot.code,
                              expires_at=snapshot.expires_at,
                              raw_hint=snapshot.raw_hint,
                          )
                      )
                      session.commit()
                      return snapshot.code
                  time.sleep(2)
              return None

          def mark_same_role_for_repair(session, account, role):
              rows = list(
                  session.scalars(
                      select(TgAccountAuthorization).where(
                          TgAccountAuthorization.account_id == account.id,
                          TgAccountAuthorization.disabled_at.is_(None),
                          TgAccountAuthorization.role == role,
                      )
                  )
              )
              for row in rows:
                  row.status = NEEDS_REPAIR_STATUS
                  row.failure_reason = "同角色备用授权已由 direct ops 重新登录，旧授权待确认后停用"

          def login_role(session, account, apps, role):
              app = choose_app(apps, account, role)
              credentials = credentials_for_developer_app(app, None)
              phone = get_account_phone(account)
              try:
                  challenge = gateway.start_login("code", account_id=account.id, phone=phone, credentials=credentials)
              except Exception as exc:
                  return {"role": role, "ok": False, "stage": "start_exception", "detail": str(exc)}
              flow = TgLoginFlow(
                  tenant_id=account.tenant_id,
                  account_id=account.id,
                  method="code",
                  status=challenge.status,
                  code_preview=challenge.code_preview,
                  code_expires_at=challenge.code_expires_at,
                  authorization_role=role,
                  developer_app_id=app.id,
                  proxy_id=None,
              )
              session.add(flow)
              session.commit()
              code = poll_login_code(session, account, flow)
              if not code:
                  flow.failure_type = "verification_code_unreadable"
                  flow.failure_detail = "主授权未读取到备用登录验证码"
                  session.commit()
                  return {"role": role, "ok": False, "stage": "code", "detail": flow.failure_detail}
              try:
                  status, raw_session = gateway.finish_login(code, None, account_id=account.id, phone=phone, credentials=credentials)
                  if status == AccountStatus.WAITING_2FA.value:
                      status, raw_session = gateway.finish_login(None, TWO_FA_PASSWORD, account_id=account.id, phone=phone, credentials=credentials)
              except Exception as exc:
                  flow.failure_type = "standby_login_exception"
                  flow.failure_detail = str(exc)
                  session.commit()
                  return {"role": role, "ok": False, "stage": "finish_exception", "detail": str(exc)}
              flow.status = status
              flow.code_preview = None
              if status != AccountStatus.ACTIVE.value or not raw_session:
                  flow.failure_type = "standby_login_failed"
                  flow.failure_detail = status
                  session.commit()
                  return {"role": role, "ok": False, "stage": "finish", "detail": status}
              mark_same_role_for_repair(session, account, role)
              asset = TgAccountAuthorization(
                  tenant_id=account.tenant_id,
                  account_id=account.id,
                  role=role,
                  developer_app_id=app.id,
                  proxy_id=None,
                  session_ciphertext=encrypt_session(raw_session),
                  status="standby",
                  health_status="healthy",
                  is_current=False,
                  last_success_at=_now(),
                  created_by=ACTOR,
              )
              session.add(asset)
              session.flush()
              flow.authorization_id = asset.id
              record_managed_two_fa_password(session, account, TWO_FA_PASSWORD)
              audit(
                  session,
                  tenant_id=account.tenant_id,
                  actor=ACTOR,
                  action="完成备用授权登录",
                  target_type="tg_account",
                  target_id=str(account.id),
                  detail=f"role={role}; authorization_id={asset.id}; developer_app_id={app.id}; proxy_id=none",
              )
              session.commit()
              return {"role": role, "ok": True, "authorization_id": asset.id, "developer_app_id": app.id}

          results = []
          with SessionLocal() as session:
              apps = healthy_apps(session)
              targets = gap_accounts(session)[:LIMIT]
              print(
                  "OPS_DIRECT_STANDBY_START "
                  + json.dumps(
                      {"mode": MODE, "limit": LIMIT, "target_count": len(targets), "developer_app_ids": [app.id for app in apps]},
                      ensure_ascii=False,
                  ),
                  flush=True,
              )
              for account in targets:
                  before = sorted(account_roles(session, account.id))
                  role_results = []
                  for role in STANDBY_ROLES:
                      if role in account_roles(session, account.id):
                          role_results.append({"role": role, "ok": True, "skipped": "already_exists"})
                          continue
                      role_results.append(login_role(session, account, apps, role))
                      if not role_results[-1].get("ok"):
                          break
                      session.refresh(account)
                  after = sorted(account_roles(session, account.id))
                  results.append({"account_id": account.id, "before": before, "after": after, "roles": role_results})
                  print("OPS_DIRECT_STANDBY_ACCOUNT " + json.dumps(results[-1], ensure_ascii=False), flush=True)
              summary = {
                  "mode": MODE,
                  "handled": len(results),
                  "full_standby": sum(1 for item in results if len(item["after"]) >= 2),
                  "failed": [item for item in results if len(item["after"]) < 2],
                  "results": results,
              }
              print("OPS_DIRECT_STANDBY_RESULT " + json.dumps(summary, ensure_ascii=False), flush=True)
          PY
