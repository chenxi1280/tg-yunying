name: Tianjin Ops

'on':
  workflow_dispatch:
    inputs:
      run_blocked_account_diagnostics:
        description: Run production diagnostics for blocked Tianjin account 84
        required: false
        default: true
        type: boolean

permissions:
  contents: read

jobs:
  inspect:
    runs-on: ubuntu-latest
    environment: production-silicon-valley

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Validate SSH secrets
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SILICON_VALLEY_PRODUCTION_SSH_PRIVATE_KEY }}
          DEPLOY_HOST: ${{ secrets.SILICON_VALLEY_PRODUCTION_HOST }}
          DEPLOY_USER: ${{ secrets.SILICON_VALLEY_PRODUCTION_USER }}
        run: |
          set -euo pipefail
          test -n "${SSH_PRIVATE_KEY}"
          test -n "${DEPLOY_HOST}"
          test -n "${DEPLOY_USER}"

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SILICON_VALLEY_PRODUCTION_SSH_PRIVATE_KEY }}
          DEPLOY_HOST: ${{ secrets.SILICON_VALLEY_PRODUCTION_HOST }}
          DEPLOY_USER: ${{ secrets.SILICON_VALLEY_PRODUCTION_USER }}
          DEPLOY_PORT: ${{ secrets.SILICON_VALLEY_PRODUCTION_PORT }}
          SSH_CONNECT_TIMEOUT: ${{ vars.SSH_CONNECT_TIMEOUT }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${SSH_PRIVATE_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          PORT="${DEPLOY_PORT:-22}"
          CONNECT_TIMEOUT="${SSH_CONNECT_TIMEOUT:-60}"
          cat > ~/.ssh/config <<EOF
          Host silicon-valley-production-server
            HostName ${DEPLOY_HOST}
            User ${DEPLOY_USER}
            Port ${PORT}
            IdentityFile ~/.ssh/id_ed25519
            IdentitiesOnly yes
            StrictHostKeyChecking accept-new
            ConnectTimeout ${CONNECT_TIMEOUT}
            ServerAliveInterval 15
            ServerAliveCountMax 8
          EOF
          chmod 600 ~/.ssh/config

      - name: Diagnose blocked Tianjin account
        if: ${{ inputs.run_blocked_account_diagnostics }}
        run: |
          set -euo pipefail
          ssh silicon-valley-production-server 'timeout 90 docker exec -i tgyunying-backend python -' \
            < .github/scripts/tianjin_blocked_account_diagnostics.py
