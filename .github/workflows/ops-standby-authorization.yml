name: Ops Configure Standby Authorizations

on:
  workflow_dispatch:
    inputs:
      dry_run:
        description: Inspect only, do not save 2FA or create a batch
        required: true
        default: "true"
        type: choice
        options:
          - "true"
          - "false"

permissions:
  contents: read

jobs:
  configure:
    runs-on: ubuntu-latest
    environment: production-silicon-valley
    timeout-minutes: 35

    steps:
      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SILICON_VALLEY_PRODUCTION_SSH_PRIVATE_KEY }}
          DEPLOY_HOST: ${{ secrets.SILICON_VALLEY_PRODUCTION_HOST }}
          DEPLOY_USER: ${{ secrets.SILICON_VALLEY_PRODUCTION_USER }}
          DEPLOY_PORT: ${{ secrets.SILICON_VALLEY_PRODUCTION_PORT }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${SSH_PRIVATE_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519
          cat > ~/.ssh/config <<EOF
          Host silicon-valley-production-server
            HostName ${DEPLOY_HOST}
            User ${DEPLOY_USER}
            Port ${DEPLOY_PORT:-22}
            IdentityFile ~/.ssh/id_ed25519
            IdentitiesOnly yes
            StrictHostKeyChecking accept-new
            ConnectTimeout 60
            ServerAliveInterval 15
            ServerAliveCountMax 8
          EOF
          chmod 600 ~/.ssh/config

      - name: Configure standby authorizations
        env:
          OPS_DRY_RUN: ${{ inputs.dry_run }}
          STANDBY_2FA_PASSWORD: ${{ secrets.PROD_STANDBY_2FA_PASSWORD }}
        run: |
          set -euo pipefail
          test -n "${STANDBY_2FA_PASSWORD}"
          ssh silicon-valley-production-server \
            "docker exec -i -e OPS_DRY_RUN='${OPS_DRY_RUN}' -e STANDBY_2FA_PASSWORD='${STANDBY_2FA_PASSWORD}' tgyunying-worker-account-security python -" <<'PY'
          import json
          import os
          import time

          from sqlalchemy import select

          from app.database import SessionLocal
          from app.models import AccountStatus, TgAccount, TgAccountAuthorization
          from app.schemas.account_security import AccountSecurityBatchCreate, ManagedTwoFaRequest
          from app.services.account_authorization_constants import ACTIVE_STATUSES
          from app.services.account_security.service import (
              account_security_batch_detail,
              create_account_security_batch,
              save_managed_two_fa_password,
          )
          from app.worker import drain_once

          STANDBY_ROLES = ("standby_1", "standby_2")
          ACTOR = "ops-standby-authorization"
          REASON = "线上账号备用授权配置"
          DRY_RUN = os.environ.get("OPS_DRY_RUN", "true").lower() == "true"
          TWO_FA_PASSWORD = os.environ["STANDBY_2FA_PASSWORD"]

          def standby_roles(session, account_id):
              return set(
                  session.scalars(
                      select(TgAccountAuthorization.role).where(
                          TgAccountAuthorization.account_id == account_id,
                          TgAccountAuthorization.disabled_at.is_(None),
                          TgAccountAuthorization.role.in_(STANDBY_ROLES),
                          TgAccountAuthorization.status.in_(list(ACTIVE_STATUSES) + ["standby"]),
                          TgAccountAuthorization.session_ciphertext != "",
                      )
                  )
              )

          def online_gap_accounts(session):
              accounts = list(
                  session.scalars(
                      select(TgAccount).where(
                          TgAccount.deleted_at.is_(None),
                          TgAccount.status == AccountStatus.ACTIVE.value,
                          TgAccount.session_ciphertext != "",
                      ).order_by(TgAccount.id.asc())
                  )
              )
              result = []
              for account in accounts:
                  roles = standby_roles(session, account.id)
                  if len(roles) < 2:
                      result.append(
                          {
                              "id": account.id,
                              "display_name": account.display_name,
                              "status": account.status,
                              "standby_roles": sorted(roles),
                              "missing_roles": [role for role in STANDBY_ROLES if role not in roles],
                          }
                      )
              return result

          with SessionLocal() as session:
              gaps = online_gap_accounts(session)
              print("OPS_STANDBY_GAPS " + json.dumps(gaps, ensure_ascii=False), flush=True)
              if DRY_RUN or not gaps:
                  print("OPS_STANDBY_RESULT " + json.dumps({"dry_run": DRY_RUN, "gap_count": len(gaps)}, ensure_ascii=False), flush=True)
                  raise SystemExit(0)
              account_ids = [item["id"] for item in gaps]
              for account_id in account_ids:
                  save_managed_two_fa_password(
                      session,
                      1,
                      account_id,
                      ManagedTwoFaRequest(password=TWO_FA_PASSWORD, reason=REASON),
                      ACTOR,
                  )
              batch = create_account_security_batch(
                  session,
                  1,
                  AccountSecurityBatchCreate(
                      account_ids=account_ids,
                      action_types=["provision_standby_session", "self_heal_session"],
                      standby_slot_strategy="auto_missing",
                      reason=REASON,
                      confirm_text="确认",
                  ),
                  ACTOR,
              )
              batch_id = batch.id
              print("OPS_STANDBY_BATCH_CREATED " + json.dumps({"batch_id": batch_id, "account_ids": account_ids}, ensure_ascii=False), flush=True)

          processed_total = 0
          deadline = time.time() + 1500
          final_detail = None
          while time.time() < deadline:
              processed = drain_once(20, role="account-security")
              processed_total += processed
              with SessionLocal() as session:
                  final_detail = account_security_batch_detail(session, 1, batch_id)
                  open_items = [item for item in final_detail.items if item.status in {"pending", "running", "waiting"}]
                  if final_detail.status != "running" or not open_items:
                      break
              if processed == 0:
                  time.sleep(5)

          detail = final_detail.model_dump(mode="json") if hasattr(final_detail, "model_dump") else dict(final_detail)
          summary = {
              "batch_id": batch_id,
              "processed_total": processed_total,
              "status": detail["status"],
              "total_count": detail["total_count"],
              "success_count": detail["success_count"],
              "failed_count": detail["failed_count"],
              "skipped_count": detail["skipped_count"],
              "items": [
                  {
                      "account_id": item["account_id"],
                      "status": item["status"],
                      "standby_session_status": item.get("standby_session_status", ""),
                      "failure_type": item.get("failure_type", ""),
                      "failure_detail": item.get("failure_detail", ""),
                  }
                  for item in detail["items"]
              ],
          }
          print("OPS_STANDBY_RESULT " + json.dumps(summary, ensure_ascii=False), flush=True)
          if summary["status"] not in {"succeeded", "partial_success"}:
              raise SystemExit(1)
          PY
