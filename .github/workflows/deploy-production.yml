name: Deploy Production

'on':
  workflow_dispatch:

permissions:
  contents: read

jobs:
  initialize-production-profiles:
    runs-on: ubuntu-latest
    environment: production-silicon-valley

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SILICON_VALLEY_PRODUCTION_SSH_PRIVATE_KEY }}
          DEPLOY_HOST: ${{ secrets.SILICON_VALLEY_PRODUCTION_HOST }}
          DEPLOY_USER: ${{ secrets.SILICON_VALLEY_PRODUCTION_USER }}
          DEPLOY_PORT: ${{ secrets.SILICON_VALLEY_PRODUCTION_PORT }}
          SSH_CONNECT_TIMEOUT: ${{ vars.SSH_CONNECT_TIMEOUT }}
        run: |
          set -euo pipefail
          test -n "${SSH_PRIVATE_KEY}"
          test -n "${DEPLOY_HOST}"
          test -n "${DEPLOY_USER}"
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${SSH_PRIVATE_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          PORT="${DEPLOY_PORT:-22}"
          CONNECT_TIMEOUT="${SSH_CONNECT_TIMEOUT:-60}"
          cat > ~/.ssh/config <<EOF
          Host silicon-valley-production-server
            HostName ${DEPLOY_HOST}
            User ${DEPLOY_USER}
            Port ${PORT}
            IdentityFile ~/.ssh/id_ed25519
            IdentitiesOnly yes
            StrictHostKeyChecking accept-new
            ConnectTimeout ${CONNECT_TIMEOUT}
            ServerAliveInterval 15
            ServerAliveCountMax 8
          EOF
          chmod 600 ~/.ssh/config

      - name: Initialize incomplete production account profiles
        run: |
          set -euo pipefail
          ssh silicon-valley-production-server 'docker ps --filter name=tgyunying --format "{{.Names}} {{.Status}}"'
          ssh silicon-valley-production-server 'docker inspect tgyunying-backend --format "{{.State.Status}} {{if .State.Health}}{{.State.Health.Status}}{{end}}"'
          ssh silicon-valley-production-server 'docker exec -i tgyunying-backend python -' < .github/scripts/ops_initialize_profiles.py
