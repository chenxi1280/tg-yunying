name: Deploy Production

'on':
  workflow_dispatch:
  push:
    branches:
      - release

concurrency:
  group: deploy-production
  cancel-in-progress: false

permissions:
  contents: read
  packages: write

env:
  GHCR_NAMESPACE: chenxi1280
  TGYUNYING_BACKEND_IMAGE_NAME: tg-yunying-backend
  TGYUNYING_FRONTEND_IMAGE_NAME: tg-yunying-frontend

jobs:
  checks:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: tester
          POSTGRES_PASSWORD: tester
          POSTGRES_DB: tg_yunying_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tester -d tg_yunying_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Backend checks
        working-directory: backend
        env:
          APP_ENV: test
          TEST_DATABASE_URL: postgresql+psycopg://tester:tester@127.0.0.1:5432/tg_yunying_test?connect_timeout=3
          DATABASE_URL: postgresql+psycopg://tester:tester@127.0.0.1:5432/tg_yunying_test?connect_timeout=3
          REDIS_URL: redis://127.0.0.1:6379/0
          SESSION_SECRET_KEY: ci-session-secret
          ADMIN_BOOTSTRAP_USERNAME: admin
          ADMIN_BOOTSTRAP_PASSWORD: ci-admin-password
          TG_GATEWAY_MODE: mock
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'
          python -m compileall -q app
          python -m pytest -q

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend build
        working-directory: frontend
        env:
          VITE_API_BASE: /api
        run: |
          set -euo pipefail
          npm ci
          npm run build

  build-images:
    runs-on: ubuntu-latest
    needs: checks

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.backend
          push: true
          tags: ghcr.io/${{ env.GHCR_NAMESPACE }}/${{ env.TGYUNYING_BACKEND_IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha,scope=tgyunying-backend
          cache-to: type=gha,mode=max,scope=tgyunying-backend

      - name: Build and push frontend static image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          tags: ghcr.io/${{ env.GHCR_NAMESPACE }}/${{ env.TGYUNYING_FRONTEND_IMAGE_NAME }}:${{ github.sha }}
          build-args: |
            VITE_API_BASE=/api
          cache-from: type=gha,scope=tgyunying-frontend
          cache-to: type=gha,mode=max,scope=tgyunying-frontend

  deploy:
    runs-on: ubuntu-latest
    needs:
      - checks
      - build-images
    environment: production-silicon-valley

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate deploy secrets
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SILICON_VALLEY_PRODUCTION_SSH_PRIVATE_KEY }}
          DEPLOY_HOST: ${{ secrets.SILICON_VALLEY_PRODUCTION_HOST }}
          DEPLOY_USER: ${{ secrets.SILICON_VALLEY_PRODUCTION_USER }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN || github.token }}
        run: |
          set -euo pipefail
          test -n "${SSH_PRIVATE_KEY}"
          test -n "${DEPLOY_HOST}"
          test -n "${DEPLOY_USER}"
          test -n "${GHCR_TOKEN}"

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SILICON_VALLEY_PRODUCTION_SSH_PRIVATE_KEY }}
          DEPLOY_HOST: ${{ secrets.SILICON_VALLEY_PRODUCTION_HOST }}
          DEPLOY_USER: ${{ secrets.SILICON_VALLEY_PRODUCTION_USER }}
          DEPLOY_PORT: ${{ secrets.SILICON_VALLEY_PRODUCTION_PORT }}
          SSH_CONNECT_TIMEOUT: ${{ vars.SSH_CONNECT_TIMEOUT }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${SSH_PRIVATE_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          PORT="${DEPLOY_PORT:-22}"
          CONNECT_TIMEOUT="${SSH_CONNECT_TIMEOUT:-60}"
          cat > ~/.ssh/config <<EOF
          Host silicon-valley-production-server
            HostName ${DEPLOY_HOST}
            User ${DEPLOY_USER}
            Port ${PORT}
            IdentityFile ~/.ssh/id_ed25519
            IdentitiesOnly yes
            StrictHostKeyChecking accept-new
            ConnectTimeout ${CONNECT_TIMEOUT}
            ServerAliveInterval 15
            ServerAliveCountMax 8
            ControlMaster auto
            ControlPersist 10m
            ControlPath ~/.ssh/control-%C
          EOF
          chmod 600 ~/.ssh/config

      - name: Deploy via SSH release script
        env:
          SILICON_VALLEY_PRODUCTION_BASE_DIR: ${{ vars.SILICON_VALLEY_PRODUCTION_BASE_DIR }}
          SILICON_VALLEY_RELEASE_BRANCHES: ${{ vars.SILICON_VALLEY_RELEASE_BRANCHES }}
          DEPLOY_USER: ${{ secrets.SILICON_VALLEY_PRODUCTION_USER }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME || github.actor }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN || github.token }}
          TGYUNYING_BACKEND_IMAGE: ghcr.io/${{ env.GHCR_NAMESPACE }}/${{ env.TGYUNYING_BACKEND_IMAGE_NAME }}:${{ github.sha }}
          TGYUNYING_FRONTEND_IMAGE: ghcr.io/${{ env.GHCR_NAMESPACE }}/${{ env.TGYUNYING_FRONTEND_IMAGE_NAME }}:${{ github.sha }}
          TGYUNYING_FRONTEND_STATIC_BASE_DIR: ${{ vars.TGYUNYING_FRONTEND_STATIC_BASE_DIR }}
          TGYUNYING_WEB_HOST: ${{ vars.TGYUNYING_WEB_HOST }}
          POST_DEPLOY_CHECKS_ENABLED: ${{ vars.POST_DEPLOY_CHECKS_ENABLED }}
          TGYUNYING_CHECK_HOST_NGINX: ${{ vars.TGYUNYING_CHECK_HOST_NGINX }}
          TGYUNYING_CHECK_PUBLIC_URLS: ${{ vars.TGYUNYING_CHECK_PUBLIC_URLS }}
          TGYUNYING_CHECK_ATTEMPTS: ${{ vars.TGYUNYING_CHECK_ATTEMPTS }}
          TGYUNYING_CHECK_RETRY_DELAY_SECONDS: ${{ vars.TGYUNYING_CHECK_RETRY_DELAY_SECONDS }}
          SSH_CONNECT_TIMEOUT: ${{ vars.SSH_CONNECT_TIMEOUT }}
          RELEASE_SSH_ATTEMPTS: ${{ vars.RELEASE_SSH_ATTEMPTS }}
          RELEASE_SSH_RETRY_DELAY: ${{ vars.RELEASE_SSH_RETRY_DELAY }}
        run: |
          set -euo pipefail
          BASE_DIR="${SILICON_VALLEY_PRODUCTION_BASE_DIR:-/data/tgyunying}"
          BRANCHES="${SILICON_VALLEY_RELEASE_BRANCHES:-release}"
          bash deploy/release.sh \
            --host silicon-valley-production-server \
            --user "${DEPLOY_USER}" \
            --base-dir "${BASE_DIR}" \
            --branch-list "${BRANCHES}"

      - name: Probe production planner drain
        run: |
          set -euo pipefail
          ssh silicon-valley-production-server '
            set -euo pipefail
            echo "==> planner logs before once"
            docker logs --tail 120 tgyunying-worker-planner || true
            echo "==> planner once"
            timeout 180 docker exec tgyunying-worker-planner python -m app.worker --once --role planner --limit 100
            echo "==> planner logs after once"
            docker logs --tail 120 tgyunying-worker-planner || true
          '

      - name: Inspect AI hourly task volume
        run: |
          set -euo pipefail
          ssh silicon-valley-production-server 'docker exec -i tgyunying-backend python -' <<'PY'
          import json
          from datetime import datetime, timedelta, timezone

          from sqlalchemy import func, select

          from app.config import get_settings
          from app.database import SessionLocal
          from app.models import Action, Task, WorkerHeartbeat
          from app.services.task_center.service import _hard_hourly_due_candidate, _hard_hourly_wake_query
          from app.services.task_center.stats import planner_backlog_snapshot, refresh_task_stats

          TASKS = {
              '天津': '8ab323c9-c569-4253-8fe1-9b7bbd695640',
              '青岛师范学院': '8c3edc4f-f8aa-40d1-ad8b-1c1809c7c576',
              '石家庄': '76a996b7-3cc3-4a9a-ace2-cba3f12578d6',
          }

          now = datetime.now(timezone(timedelta(hours=8)))
          now_local = now.replace(tzinfo=None)
          def iso(value):
              return value.isoformat() if value else None

          def due_entry(rank, sort_key, task):
              next_check = sort_key[0]
              next_check = None if next_check == datetime.min else next_check
              return {
                  'rank': rank,
                  'task_id': task.id,
                  'name': task.name,
                  'priority': int(task.priority or 0),
                  'next_check': iso(next_check),
                  'deficit': int(-sort_key[1]),
                  'next_run_at': iso(task.next_run_at),
              }

          rows = []
          with SessionLocal() as session:
              settings = get_settings()
              active_workers = session.scalar(
                  select(func.count(WorkerHeartbeat.worker_id)).where(
                      WorkerHeartbeat.last_seen_at >= now.replace(tzinfo=None) - timedelta(minutes=2),
                  )
              )
              worker_counts = dict(
                  session.execute(
                      select(WorkerHeartbeat.process_type, func.count(WorkerHeartbeat.worker_id))
                      .where(WorkerHeartbeat.last_seen_at >= now.replace(tzinfo=None) - timedelta(minutes=2))
                      .group_by(WorkerHeartbeat.process_type)
                  ).all()
              )
              worker_heartbeats = [
                  {
                      'worker_id': row.worker_id,
                      'process_type': row.process_type,
                      'last_seen_at': iso(row.last_seen_at),
                      'metadata': row.heartbeat_metadata or {},
                  }
                  for row in session.scalars(
                      select(WorkerHeartbeat)
                      .where(WorkerHeartbeat.last_seen_at >= now.replace(tzinfo=None) - timedelta(minutes=5))
                      .order_by(WorkerHeartbeat.process_type.asc(), WorkerHeartbeat.last_seen_at.desc())
                  )
              ]
              due_candidates = sorted(
                  (
                      candidate
                      for task in session.scalars(_hard_hourly_wake_query())
                      if (candidate := _hard_hourly_due_candidate(session, task, now_local)) is not None
                  ),
                  key=lambda candidate: candidate[0],
              )
              due_rank = {task.id: index + 1 for index, (_sort_key, task) in enumerate(due_candidates)}
              due_sample = [
                  due_entry(index, sort_key, task)
                  for index, (sort_key, task) in enumerate(due_candidates[:10], start=1)
              ]
              for name, task_id in TASKS.items():
                  task = session.get(Task, task_id)
                  if not task:
                      rows.append({'name': name, 'task_id': task_id, 'missing': True})
                      continue
                  stats = refresh_task_stats(session, task)
                  backlog = planner_backlog_snapshot(session, task)
                  action_counts = dict(
                      session.execute(
                          select(Action.status, func.count(Action.id))
                          .where(Action.task_id == task.id)
                          .group_by(Action.status)
                      ).all()
                  )
                  type_status_counts = [
                      {
                          'action_type': str(action_type),
                          'status': str(status),
                          'count': int(count),
                      }
                      for action_type, status, count in session.execute(
                          select(Action.action_type, Action.status, func.count(Action.id))
                          .where(Action.task_id == task.id)
                          .group_by(Action.action_type, Action.status)
                          .order_by(Action.action_type.asc(), Action.status.asc())
                      ).all()
                  ]
                  recent_send_actions = [
                      {
                          'id': action.id,
                          'status': action.status,
                          'account_id': action.account_id,
                          'scheduled_at': iso(action.scheduled_at),
                          'executed_at': iso(action.executed_at),
                          'lease_owner': action.lease_owner,
                          'claim_owner': action.claim_owner,
                          'retry_count': int(action.retry_count or 0),
                          'error_code': (action.result or {}).get('error_code'),
                          'error': str((action.result or {}).get('error') or '')[:160],
                          'hard_hourly_target': bool((action.payload or {}).get('hard_hourly_target')),
                      }
                      for action in session.scalars(
                          select(Action)
                          .where(Action.task_id == task.id, Action.action_type == 'send_message')
                          .order_by(Action.scheduled_at.desc(), Action.created_at.desc())
                          .limit(20)
                      )
                  ]
                  config = task.type_config or {}
                  rows.append({
                      'name': name,
                      'task_id': task.id,
                      'status': task.status,
                      'next_run_at': task.next_run_at.isoformat() if task.next_run_at else None,
                      'last_error': task.last_error,
                      'bucket': stats.get('hard_hourly_bucket'),
                      'goal': stats.get('hard_hourly_goal'),
                      'success': stats.get('hard_hourly_success_count'),
                      'deficit': stats.get('hard_hourly_deficit'),
                      'hard_status': stats.get('hard_hourly_status'),
                      'open': stats.get('hard_hourly_open_count'),
                      'overdue': stats.get('hard_hourly_overdue_open_count'),
                      'last_blockers': stats.get('hard_hourly_last_blockers'),
                      'last_check': stats.get('hard_hourly_last_check_at'),
                      'last_planned': stats.get('hard_hourly_last_planned_count'),
                      'next_check': stats.get('hard_hourly_next_check_at'),
                      'hard_due_rank': due_rank.get(task.id),
                      'hard_due_total': len(due_candidates),
                      'planner_backlog': backlog,
                      'planner_backlog_stats': {
                          'blocked': stats.get('planner_backlog_blocked'),
                          'global_pending': stats.get('planner_backlog_global_pending'),
                          'task_pending': stats.get('planner_backlog_task_pending'),
                          'oldest_age_seconds': stats.get('planner_backlog_oldest_age_seconds'),
                      },
                      'membership_stage': stats.get('membership_stage'),
                      'joined': stats.get('membership_joined_count'),
                      'need_join': stats.get('membership_need_join_count'),
                      'failed_join': stats.get('membership_failed_count'),
                      'action_counts': {str(key): int(value) for key, value in action_counts.items()},
                      'type_status_counts': type_status_counts,
                      'recent_send_actions': recent_send_actions,
                      'messages_per_round_mode': config.get('messages_per_round_mode'),
                      'messages_per_round': config.get('messages_per_round'),
                      'reply_min_per_round': config.get('reply_min_per_round'),
                      'slang_prompt_template_id': config.get('slang_prompt_template_id'),
                  })
              session.rollback()
          print('AI_HOURLY_TASK_VOLUME=' + json.dumps({
              'captured_at': now.isoformat(timespec='seconds'),
              'active_workers_2m': int(active_workers or 0),
              'worker_counts_2m': {str(key): int(value) for key, value in worker_counts.items()},
              'worker_heartbeats_5m': worker_heartbeats,
              'planner_backlog_thresholds': {
                  'max_pending_global': int(settings.max_pending_global or 0),
                  'max_pending_per_task': int(settings.max_pending_per_task or 0),
                  'oldest_pending_age_seconds': int(settings.oldest_pending_age_seconds or 0),
              },
              'hard_due_sample': due_sample,
              'tasks': rows,
          }, ensure_ascii=False, sort_keys=True))
          PY
