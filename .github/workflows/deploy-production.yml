name: Deploy Production

'on':
  workflow_dispatch:
    inputs:
      run_production_diagnostics:
        description: Run production planner drain and AI hourly volume diagnostics after deploy
        required: false
        default: false
        type: boolean
      run_tianjin_admission_retry:
        description: Queue all failed Tianjin target-admission accounts for retry after deploy
        required: false
        default: false
        type: boolean
      run_tianjin_diagnostics:
        description: Run lightweight Tianjin admission diagnostics without planner probing
        required: false
        default: false
        type: boolean
      sync_tianjin_remote_admin_links:
        description: Sync local group-account links for Telegram admins found in Tianjin
        required: false
        default: false
        type: boolean
      export_tianjin_invite_link:
        description: Export a fresh Tianjin invite link with the configured rescue admin before retrying admission
        required: false
        default: false
        type: boolean
      cleanup_tianjin_admission_backlog:
        description: Deduplicate stale Tianjin target-admission retry backlog
        required: false
        default: false
        type: boolean
      reconcile_account_profiles:
        description: Inspect active TG account profiles and queue Chinese profile/avatar initialization batches
        required: false
        default: false
        type: boolean
      run_tianjin_blocked_account_diagnostics:
        description: Run production diagnostics for blocked Tianjin account 84
        required: false
        default: false
        type: boolean
      run_ai_group_quality_diagnostics:
        description: Run production diagnostics for AI group quality, dedupe, voice profiles, and online state
        required: false
        default: false
        type: boolean
      update_minimax_provider:
        description: Upsert MiniMax provider from GitHub secret TGYUNYING_MINIMAX_API_KEY after deploy
        required: false
        default: false
        type: boolean
      force_cancel_in_progress:
        description: Explicitly cancel a stuck in-progress Deploy Production run before this manual run
        required: false
        default: false
        type: boolean
  push:
    branches:
      - release

concurrency:
  group: deploy-production
  cancel-in-progress: ${{ github.event_name == 'workflow_dispatch' && inputs.force_cancel_in_progress }}

permissions:
  contents: read
  packages: write

env:
  GHCR_NAMESPACE: chenxi1280
  TGYUNYING_BACKEND_IMAGE_NAME: tg-yunying-backend
  TGYUNYING_FRONTEND_IMAGE_NAME: tg-yunying-frontend

jobs:
  checks:
    runs-on: ubuntu-latest

    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_USER: tester
          POSTGRES_PASSWORD: tester
          POSTGRES_DB: tg_yunying_test
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U tester -d tg_yunying_test"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
      redis:
        image: redis:7
        ports:
          - 6379:6379
        options: >-
          --health-cmd "redis-cli ping"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.12'
          cache: pip

      - name: Backend checks
        working-directory: backend
        env:
          APP_ENV: test
          TEST_DATABASE_URL: postgresql+psycopg://tester:tester@127.0.0.1:5432/tg_yunying_test?connect_timeout=3
          DATABASE_URL: postgresql+psycopg://tester:tester@127.0.0.1:5432/tg_yunying_test?connect_timeout=3
          REDIS_URL: redis://127.0.0.1:6379/0
          SESSION_SECRET_KEY: ci-session-secret
          ADMIN_BOOTSTRAP_USERNAME: admin
          ADMIN_BOOTSTRAP_PASSWORD: ci-admin-password
          TG_GATEWAY_MODE: mock
        run: |
          set -euo pipefail
          python -m pip install --upgrade pip
          python -m pip install -e '.[dev]'
          python -m compileall -q app
          python -m pytest -q

      - name: Set up Node
        uses: actions/setup-node@v4
        with:
          node-version: '22'
          cache: npm
          cache-dependency-path: frontend/package-lock.json

      - name: Frontend build
        working-directory: frontend
        env:
          VITE_API_BASE: /api
        run: |
          set -euo pipefail
          npm ci
          npm run build

  build-images:
    runs-on: ubuntu-latest
    needs: checks

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Login to GHCR
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ github.token }}

      - name: Build and push backend image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.backend
          push: true
          tags: ghcr.io/${{ env.GHCR_NAMESPACE }}/${{ env.TGYUNYING_BACKEND_IMAGE_NAME }}:${{ github.sha }}
          cache-from: type=gha,scope=tgyunying-backend
          cache-to: type=gha,mode=max,scope=tgyunying-backend

      - name: Build and push frontend static image
        uses: docker/build-push-action@v6
        with:
          context: .
          file: Dockerfile.frontend
          push: true
          tags: ghcr.io/${{ env.GHCR_NAMESPACE }}/${{ env.TGYUNYING_FRONTEND_IMAGE_NAME }}:${{ github.sha }}
          build-args: |
            VITE_API_BASE=/api
          cache-from: type=gha,scope=tgyunying-frontend
          cache-to: type=gha,mode=max,scope=tgyunying-frontend

  deploy:
    runs-on: ubuntu-latest
    needs:
      - checks
      - build-images
    environment: production-silicon-valley

    steps:
      - name: Checkout
        uses: actions/checkout@v4
        with:
          fetch-depth: 0

      - name: Validate deploy secrets
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SILICON_VALLEY_PRODUCTION_SSH_PRIVATE_KEY }}
          DEPLOY_HOST: ${{ secrets.SILICON_VALLEY_PRODUCTION_HOST }}
          DEPLOY_USER: ${{ secrets.SILICON_VALLEY_PRODUCTION_USER }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN || github.token }}
        run: |
          set -euo pipefail
          test -n "${SSH_PRIVATE_KEY}"
          test -n "${DEPLOY_HOST}"
          test -n "${DEPLOY_USER}"
          test -n "${GHCR_TOKEN}"

      - name: Configure SSH
        env:
          SSH_PRIVATE_KEY: ${{ secrets.SILICON_VALLEY_PRODUCTION_SSH_PRIVATE_KEY }}
          DEPLOY_HOST: ${{ secrets.SILICON_VALLEY_PRODUCTION_HOST }}
          DEPLOY_USER: ${{ secrets.SILICON_VALLEY_PRODUCTION_USER }}
          DEPLOY_PORT: ${{ secrets.SILICON_VALLEY_PRODUCTION_PORT }}
          SSH_CONNECT_TIMEOUT: ${{ vars.SSH_CONNECT_TIMEOUT }}
        run: |
          set -euo pipefail
          mkdir -p ~/.ssh
          chmod 700 ~/.ssh
          printf '%s\n' "${SSH_PRIVATE_KEY}" > ~/.ssh/id_ed25519
          chmod 600 ~/.ssh/id_ed25519

          PORT="${DEPLOY_PORT:-22}"
          CONNECT_TIMEOUT="${SSH_CONNECT_TIMEOUT:-60}"
          cat > ~/.ssh/config <<EOF
          Host silicon-valley-production-server
            HostName ${DEPLOY_HOST}
            User ${DEPLOY_USER}
            Port ${PORT}
            IdentityFile ~/.ssh/id_ed25519
            IdentitiesOnly yes
            StrictHostKeyChecking accept-new
            ConnectTimeout ${CONNECT_TIMEOUT}
            ServerAliveInterval 15
            ServerAliveCountMax 8
            ControlMaster auto
            ControlPersist 10m
            ControlPath ~/.ssh/control-%C
          EOF
          chmod 600 ~/.ssh/config

      - name: Deploy via SSH release script
        env:
          SILICON_VALLEY_PRODUCTION_BASE_DIR: ${{ vars.SILICON_VALLEY_PRODUCTION_BASE_DIR }}
          SILICON_VALLEY_RELEASE_BRANCHES: ${{ vars.SILICON_VALLEY_RELEASE_BRANCHES }}
          DEPLOY_USER: ${{ secrets.SILICON_VALLEY_PRODUCTION_USER }}
          GHCR_USERNAME: ${{ secrets.GHCR_USERNAME || github.actor }}
          GHCR_TOKEN: ${{ secrets.GHCR_TOKEN || github.token }}
          TGYUNYING_BACKEND_IMAGE: ghcr.io/${{ env.GHCR_NAMESPACE }}/${{ env.TGYUNYING_BACKEND_IMAGE_NAME }}:${{ github.sha }}
          TGYUNYING_FRONTEND_IMAGE: ghcr.io/${{ env.GHCR_NAMESPACE }}/${{ env.TGYUNYING_FRONTEND_IMAGE_NAME }}:${{ github.sha }}
          TGYUNYING_FRONTEND_STATIC_BASE_DIR: ${{ vars.TGYUNYING_FRONTEND_STATIC_BASE_DIR }}
          TGYUNYING_WEB_HOST: ${{ vars.TGYUNYING_WEB_HOST }}
          POST_DEPLOY_CHECKS_ENABLED: ${{ vars.POST_DEPLOY_CHECKS_ENABLED }}
          TGYUNYING_CHECK_HOST_NGINX: ${{ vars.TGYUNYING_CHECK_HOST_NGINX }}
          TGYUNYING_CHECK_PUBLIC_URLS: ${{ vars.TGYUNYING_CHECK_PUBLIC_URLS }}
          TGYUNYING_CHECK_ATTEMPTS: ${{ vars.TGYUNYING_CHECK_ATTEMPTS }}
          TGYUNYING_CHECK_RETRY_DELAY_SECONDS: ${{ vars.TGYUNYING_CHECK_RETRY_DELAY_SECONDS }}
          SSH_CONNECT_TIMEOUT: ${{ vars.SSH_CONNECT_TIMEOUT }}
          RELEASE_SSH_ATTEMPTS: ${{ vars.RELEASE_SSH_ATTEMPTS }}
          RELEASE_SSH_RETRY_DELAY: ${{ vars.RELEASE_SSH_RETRY_DELAY }}
        run: |
          set -euo pipefail
          BASE_DIR="${SILICON_VALLEY_PRODUCTION_BASE_DIR:-/data/tgyunying}"
          BRANCHES="${SILICON_VALLEY_RELEASE_BRANCHES:-release}"
          bash deploy/release.sh \
            --host silicon-valley-production-server \
            --user "${DEPLOY_USER}" \
            --base-dir "${BASE_DIR}" \
            --branch-list "${BRANCHES}"

      - name: Probe production planner drain
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_production_diagnostics }}
        run: |
          set -euo pipefail
          timeout 330 ssh silicon-valley-production-server '
            set -euo pipefail
            echo "==> planner logs before once"
            docker logs --tail 120 tgyunying-worker-planner || true
            echo "==> planner profiled once"
            set +e
            timeout 240 docker exec -i tgyunying-worker-planner python - <<'"'"'PY'"'"'
          import faulthandler
          import sys
          import time

          from sqlalchemy import select

          from app.database import SessionLocal
          from app.models import Task
          from app.services._common import _now
          from app.services.task_center import service as svc

          LIMIT = 100
          started = time.monotonic()

          faulthandler.enable(file=sys.stderr)
          faulthandler.dump_traceback_later(60, repeat=True, file=sys.stderr)

          def mark(label):
              elapsed = time.monotonic() - started
              print(f"PLANNER_PROFILE {elapsed:0.3f}s {label}", flush=True)

          processed = 0
          future_open_action_task_ids = set()
          with SessionLocal() as session:
              mark("session-open")
              svc.record_worker_heartbeat(session, process_type="planner", metadata={"limit": LIMIT, "source": "profile"})
              mark("heartbeat-recorded")
              svc._activate_pending_tasks(session)
              mark("pending-activated")
              hard_hourly_task_ids = svc._wake_hard_hourly_tasks(session, limit=LIMIT)
              mark(f"hard-wake count={len(hard_hourly_task_ids)} ids={hard_hourly_task_ids[:10]}")
              task_ids = list(
                  session.scalars(
                      select(Task.id)
                      .where(Task.status == "running", (Task.next_run_at.is_(None)) | (Task.next_run_at <= _now()))
                      .order_by(Task.priority.asc(), Task.next_run_at.asc().nullsfirst(), Task.created_at.asc())
                      .limit(max(1, LIMIT))
                  )
              )
              mark(f"due-query count={len(task_ids)}")
              task_ids = svc._merge_planner_task_ids(hard_hourly_task_ids, task_ids, LIMIT)
              mark(f"merged count={len(task_ids)} ids={task_ids[:10]}")
              session.commit()
              mark("initial-commit")

          for task_id in task_ids:
              with SessionLocal() as session:
                  svc._refresh_planner_heartbeat(session, "planner", LIMIT, task_id=task_id)
                  task = session.get(Task, task_id)
                  if not task or task.status != "running":
                      mark(f"task-skip task_id={task_id} missing-or-not-running")
                      continue
                  mark(f"task-start task_id={task.id} name={task.name!r} type={task.type}")
                  if svc._check_stop_conditions(session, task):
                      session.commit()
                      mark(f"task-stop-conditions task_id={task.id}")
                      continue
                  processed += svc.retry_failed_actions(session, task)
                  mark(f"task-after-retry task_id={task.id}")
                  has_open_actions, open_actions_are_future = svc._open_actions_state(session, task)
                  mark(
                      "task-open-state "
                      f"task_id={task.id} has_open={has_open_actions} future={open_actions_are_future}"
                  )
                  if task.type == "group_ai_chat" and has_open_actions and not svc.hard_hourly_requires_planning(session, task, _now()):
                      if open_actions_are_future:
                          future_open_action_task_ids.add(task.id)
                      svc.refresh_task_stats(session, task)
                      session.commit()
                      mark(f"task-skip-open task_id={task.id}")
                      continue
                  if svc._planning_backlog_blocked(session, task):
                      svc.refresh_task_stats(session, task)
                      session.commit()
                      mark(f"task-backlog-blocked task_id={task.id}")
                      continue
                  mark(f"task-build-start task_id={task.id}")
                  created = svc.build_task_plan(session, task)
                  mark(f"task-build-end task_id={task.id} created={created}")
                  svc.refresh_task_stats(session, task)
                  task.next_run_at = svc.next_run_after_task(task)
                  session.commit()
                  processed += created
                  mark(f"task-commit task_id={task.id} processed={processed}")
          mark(f"done processed={processed} future_open={sorted(future_open_action_task_ids)}")
          PY
            status=$?
            set -e
            echo "PLANNER_PROFILE_EXIT=${status}"
            if [[ "${status}" -ne 0 ]]; then
              echo "planner profile exited non-zero; inspect will still run for state capture"
            fi
            echo "==> planner logs after profile"
            docker logs --tail 120 tgyunying-worker-planner || true
          '

      - name: Export Tianjin invite link
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.export_tianjin_invite_link }}
        run: |
          set -euo pipefail
          echo "TIANJIN_INVITE_LINK_EXPORT_START"
          ssh silicon-valley-production-server 'timeout 90 docker exec -i tgyunying-backend python -' \
            < .github/scripts/tianjin_export_invite_link.py
          echo "TIANJIN_INVITE_LINK_EXPORT_END"

      - name: Queue Tianjin admission retry
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_tianjin_admission_retry }}
        run: |
          set -euo pipefail
          ssh silicon-valley-production-server 'docker exec -i tgyunying-backend python -' <<'PY'
          import json

          from app.database import SessionLocal
          from app.schemas.operations import OperationTargetAdmissionRetryRequest
          from app.services.operations import retry_operation_target_admission

          TARGET_ID = 485

          with SessionLocal() as session:
              result = retry_operation_target_admission(
                  session,
                  1,
                  TARGET_ID,
                  OperationTargetAdmissionRetryRequest(reason='天津音乐学院全量准入重试：管理员解除限制后重新加入', account_ids=[]),
                  'github-actions',
              )
              retry = result.get('admission_retry') or {}
              compact = {
                  'target_id': TARGET_ID,
                  'task_id': retry.get('task_id'),
                  'retried_account_count': retry.get('retried_account_count'),
                  'queued_action_count': retry.get('queued_action_count'),
                  'failed_account_count': retry.get('failed_account_count'),
              }
              print('TIANJIN_ADMISSION_RETRY=' + json.dumps(compact, ensure_ascii=False, sort_keys=True), flush=True)
          PY

      - name: Sync Tianjin remote admin links
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.sync_tianjin_remote_admin_links }}
        run: |
          set -euo pipefail
          echo "TIANJIN_REMOTE_ADMIN_LINK_SYNC_START"
          ssh silicon-valley-production-server 'timeout 90 docker exec -i tgyunying-backend python -' \
            < .github/scripts/tianjin_sync_remote_admin_links.py
          echo "TIANJIN_REMOTE_ADMIN_LINK_SYNC_END"

      - name: Cleanup Tianjin admission backlog
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.cleanup_tianjin_admission_backlog }}
        run: |
          set -euo pipefail
          echo "TIANJIN_ADMISSION_BACKLOG_CLEANUP_START"
          ssh silicon-valley-production-server 'timeout 120 docker exec -i tgyunying-backend python -' \
            < .github/scripts/tianjin_cleanup_admission_backlog.py
          echo "TIANJIN_ADMISSION_BACKLOG_CLEANUP_END"

      - name: Reconcile account profile initialization
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.reconcile_account_profiles }}
        run: |
          set -euo pipefail
          echo "ACCOUNT_PROFILE_RECONCILE_START"
          ssh silicon-valley-production-server 'timeout 1200 docker exec -e ACCOUNT_PROFILE_RECONCILE_APPLY=true -e ACCOUNT_PROFILE_RECONCILE_DRAIN_ONCE=true -i tgyunying-backend python -' \
            < .github/scripts/account_profile_initialization_reconcile.py
          echo "ACCOUNT_PROFILE_RECONCILE_END"

      - name: Update MiniMax AI provider
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.update_minimax_provider }}
        env:
          MINIMAX_API_KEY: ${{ secrets.TGYUNYING_MINIMAX_API_KEY }}
        run: |
          set -euo pipefail
          test -n "${MINIMAX_API_KEY}"
          echo "MINIMAX_PROVIDER_UPDATE_START"
          {
            printf '%s\n' "$(printf '%s' "${MINIMAX_API_KEY}" | base64 | tr -d '\n')"
            base64 < .github/scripts/update_minimax_provider.py | tr -d '\n'
            printf '\n'
          } | ssh silicon-valley-production-server 'set -euo pipefail
            read -r minimax_key_b64
            read -r script_b64
            export MINIMAX_API_KEY="$(printf "%s" "${minimax_key_b64}" | base64 -d)"
            printf "%s" "${script_b64}" | base64 -d | timeout 120 docker exec -e MINIMAX_API_KEY -e MINIMAX_BASE_URL=https://api.minimaxi.com/v1 -e MINIMAX_MODEL_NAME=MiniMax-M3 -e MINIMAX_TENANT_ID=1 -i tgyunying-backend python -
          '
          echo "MINIMAX_PROVIDER_UPDATE_END"

      - name: Diagnose Tianjin blocked account
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_tianjin_blocked_account_diagnostics }}
        run: |
          set -euo pipefail
          echo "TIANJIN_BLOCKED_ACCOUNT_DIAGNOSTICS_START"
          ssh silicon-valley-production-server 'timeout 90 docker exec -i tgyunying-backend python -' \
            < .github/scripts/tianjin_blocked_account_diagnostics.py
          echo "TIANJIN_BLOCKED_ACCOUNT_DIAGNOSTICS_END"

      - name: Inspect Tianjin admission state
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_tianjin_diagnostics }}
        run: |
          set -euo pipefail
          echo "TIANJIN_LIGHT_INSPECT_START"
          ssh silicon-valley-production-server 'timeout 90 docker exec -i tgyunying-backend python -' \
            < .github/scripts/tianjin_admission_diagnostics.py
          echo "TIANJIN_LIGHT_INSPECT_END"

      - name: Inspect AI hourly task volume
        if: ${{ github.event_name == 'workflow_dispatch' && inputs.run_production_diagnostics }}
        run: |
          set -euo pipefail
          echo "AI_HOURLY_INSPECT_START"
          set +e
          timeout 150 ssh silicon-valley-production-server 'timeout 120 docker exec -i tgyunying-backend python -' <<'PY'
          import json
          from collections import Counter
          from datetime import datetime, timedelta, timezone

          from sqlalchemy import func, select

          from app.config import get_settings
          from app.database import SessionLocal
          from app.models import Action, OperationTarget, Task, Tenant, TgAccount, TgGroup, TgGroupAccount, VerificationTask, WorkerHeartbeat
          from app.services.task_center.service import _hard_hourly_due_candidate, _hard_hourly_wake_query
          from app.services.task_center.stats import planner_backlog_snapshot

          TASKS = {
              '天津': '8ab323c9-c569-4253-8fe1-9b7bbd695640',
              '青岛师范学院': '8c3edc4f-f8aa-40d1-ad8b-1c1809c7c576',
              '石家庄': '76a996b7-3cc3-4a9a-ace2-cba3f12578d6',
          }

          now = datetime.now(timezone(timedelta(hours=8)))
          now_local = now.replace(tzinfo=None)
          inspection_since = now_local - timedelta(hours=2)
          def iso(value):
              return value.isoformat() if value else None

          def account_snapshot(account):
              if not account:
                  return None
              return {
                  'id': account.id,
                  'display_name': account.display_name,
                  'username': account.username,
                  'phone_masked': account.phone_masked,
                  'status': account.status,
                  'deleted_at': iso(account.deleted_at),
                  'has_session': bool(account.session_ciphertext),
              }

          def group_account_snapshot(session, group_id, account_id):
              if not group_id or not account_id:
                  return None
              link = session.scalar(
                  select(TgGroupAccount).where(
                      TgGroupAccount.group_id == group_id,
                      TgGroupAccount.account_id == account_id,
                  )
              )
              if not link:
                  return None
              return {
                  'permission_label': link.permission_label,
                  'can_send': bool(link.can_send),
                  'is_listener': bool(link.is_listener),
                  'last_sent_at': iso(link.last_sent_at),
              }

          def due_entry(rank, sort_key, task):
              next_check = sort_key[0]
              next_check = None if next_check == datetime.min else next_check
              return {
                  'rank': rank,
                  'task_id': task.id,
                  'name': task.name,
                  'priority': int(task.priority or 0),
                  'next_check': iso(next_check),
                  'deficit': int(-sort_key[1]),
                  'next_run_at': iso(task.next_run_at),
              }

          rows = []
          with SessionLocal() as session:
              settings = get_settings()
              active_workers = session.scalar(
                  select(func.count(WorkerHeartbeat.worker_id)).where(
                      WorkerHeartbeat.last_seen_at >= now.replace(tzinfo=None) - timedelta(minutes=2),
                  )
              )
              worker_counts = dict(
                  session.execute(
                      select(WorkerHeartbeat.process_type, func.count(WorkerHeartbeat.worker_id))
                      .where(WorkerHeartbeat.last_seen_at >= now.replace(tzinfo=None) - timedelta(minutes=2))
                      .group_by(WorkerHeartbeat.process_type)
                  ).all()
              )
              worker_heartbeats = [
                  {
                      'worker_id': row.worker_id,
                      'process_type': row.process_type,
                      'last_seen_at': iso(row.last_seen_at),
                      'metadata': row.heartbeat_metadata or {},
                  }
                  for row in session.scalars(
                      select(WorkerHeartbeat)
                      .where(WorkerHeartbeat.last_seen_at >= now.replace(tzinfo=None) - timedelta(minutes=5))
                      .order_by(WorkerHeartbeat.process_type.asc(), WorkerHeartbeat.last_seen_at.desc())
                  )
              ]
              due_candidates = sorted(
                  (
                      candidate
                      for task in session.scalars(_hard_hourly_wake_query())
                      if (candidate := _hard_hourly_due_candidate(session, task, now_local)) is not None
                  ),
                  key=lambda candidate: candidate[0],
              )
              due_rank = {task.id: index + 1 for index, (_sort_key, task) in enumerate(due_candidates)}
              due_sample = [
                  due_entry(index, sort_key, task)
                  for index, (sort_key, task) in enumerate(due_candidates[:10], start=1)
              ]
              for name, task_id in TASKS.items():
                  task = session.get(Task, task_id)
                  if not task:
                      rows.append({'name': name, 'task_id': task_id, 'missing': True})
                      continue
                  stats = dict(task.stats or {})
                  backlog = planner_backlog_snapshot(session, task)
                  action_counts = dict(
                      session.execute(
                          select(Action.status, func.count(Action.id))
                          .where(Action.task_id == task.id)
                          .where(Action.scheduled_at >= inspection_since)
                          .group_by(Action.status)
