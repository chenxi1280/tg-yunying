services:
  postgres:
    image: postgres:16
    container_name: tg-yunying-postgres
    environment:
      POSTGRES_DB: tg_yunying
      POSTGRES_USER: tg_yunying
      POSTGRES_PASSWORD: tg_yunying
    ports:
      - "5432:5432"
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tg_yunying -d tg_yunying"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

  redis:
    image: redis:7
    container_name: tg-yunying-redis
    ports:
      - "6379:6379"
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 10
    restart: unless-stopped

volumes:
  postgres_data:
  redis_data:
